<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>目的地信息提取测试</title>
  <link rel="stylesheet" href="https://unpkg.com/antd@3.26.20/dist/antd.min.css">
  <style>
    body { padding: 20px; font-family: sans-serif; }
    .content-card { margin-bottom: 20px; border: 1px solid #d9d9d9; border-radius: 4px; }
    .content-cardtitle-text { padding: 12px 16px; font-weight: 600; background: #fafafa; }
    .content-cardbody { padding: 16px; }
    .contentcard-desc-title {
      margin-bottom: 16px;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1.6;
    }
    .mb16 { margin-bottom: 16px; }
  </style>
</head>
<body>
  <h1>目的地信息提取测试</h1>
  <p>用于测试插件能否正确提取 contentcard-desc-title 中的产品标题</p>

  <div class="content-card">
    <div class="content-cardtitle-text">基础信息</div>
    <div class="content-cardbody">

      <!-- 目的地信息（新增的提取目标） -->
      <div class="contentcard-desc-title">
        <span data-lcpignore="true" style="margin-right: 16px;">
          格鲁吉亚+亚美尼亚10日9晚私家团·=定制线路·不含酒店=英文司机+中文管家| 24h接送机+独立成团 | 孤独星球封面*四驱车登山*酒庄品酒*诺亚方舟停靠地*高加索蓝眼泪
        </span>
        <i aria-label="图标: info-circle" class="anticon anticon-info-circle" style="color: rgb(128, 140, 157); margin-left: 5px; font-size: 10.5px;">
          <svg viewBox="64 64 896 896" focusable="false" class="" data-icon="info-circle" width="1em" height="1em" fill="currentColor" aria-hidden="true">
            <path d="M512 64C264.6 64 64 264.6 64 512s200.6 448 448 448 448-200.6 448-448S759.4 64 512 64zm0 820c-205.4 0-372-166.6-372-372s166.6-372 372-372 372 166.6 372 372-166.6 372-372 372z"></path>
            <path d="M464 336a48 48 0 1 0 96 0 48 48 0 1 0-96 0zm72 112h-48c-4.4 0-8 3.6-8 8v272c0 4.4 3.6 8 8 8h48c4.4 0 8-3.6 8-8V456c0-4.4-3.6-8-8-8z"></path>
          </svg>
        </i>
      </div>

      <!-- 普通表单字段 -->
      <div class="ant-row ant-form-item mb16">
        <div class="ant-col ant-col-4 ant-form-item-label">
          <label for="baseInfo.productName" class="ant-form-item-required" title="产品名称">产品名称</label>
        </div>
        <div class="ant-col ant-col-16 ant-form-item-control-wrapper">
          <div class="ant-form-item-control has-success">
            <span class="ant-form-item-children">
              <input id="baseInfo.productName" class="ant-input" type="text" value="格鲁吉亚+亚美尼亚10日9晚私家团">
            </span>
          </div>
        </div>
      </div>

      <div class="ant-row ant-form-item mb16">
        <div class="ant-col ant-col-4 ant-form-item-label">
          <label for="baseInfo.tourType" class="ant-form-item-required" title="产品类型">产品类型</label>
        </div>
        <div class="ant-col ant-col-16 ant-form-item-control-wrapper">
          <div class="ant-form-item-control has-success">
            <span class="ant-form-item-children">
              <div class="ant-select ant-select-enabled" style="width: 200px;">
                <div class="ant-select-selection ant-select-selection--single">
                  <div class="ant-select-selection__rendered">
                    <div class="ant-select-selection-selected-value" title="私家团">私家团</div>
                  </div>
                </div>
              </div>
            </span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    console.log('测试页面已加载，请在浏览器中安装插件后测试导出功能');
    console.log('预期导出结果：');
    console.log('基础信息分组中应包含：');
    console.log('  - 目的地信息: {');
    console.log('      domKey: "baseInfo.destinationInfo",');
    console.log('      label: "目的地信息",');
    console.log('      value: "格鲁吉亚+亚美尼亚10日9晚私家团·=定制线路·不含酒店=英文司机+中文管家| 24h接送机+独立成团 | 孤独星球封面*四驱车登山*酒庄品酒*诺亚方舟停靠地*高加索蓝眼泪",');
    console.log('      fieldType: "input"');
    console.log('    }');
    console.log('  - 产品名称: { value: "格鲁吉亚+亚美尼亚10日9晚私家团" }');
    console.log('  - 产品类型: { value: { text: "私家团" } }');
  </script>
</body>
</html>
