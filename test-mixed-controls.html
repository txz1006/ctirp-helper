<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>控件组合测试 - VBK 插件</title>
  <link rel="stylesheet" href="https://unpkg.com/antd@3.26.20/dist/antd.min.css">
  <style>
    body { padding: 20px; font-family: sans-serif; }
    .content-card { margin-bottom: 20px; border: 1px solid #d9d9d9; border-radius: 4px; }
    .content-cardtitle-text { padding: 12px 16px; font-weight: 600; background: #fafafa; }
    .content-cardbody { padding: 16px; }
    .mb16 { margin-bottom: 16px; }
    .nodisplay { display: none; }
    .info-circle { margin-left: 4px; color: #1890ff; cursor: help; }
    .publicTip { margin-top: 8px; color: #999; font-size: 12px; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>控件组合测试页面</h1>
  <p>用于测试插件对复杂控件组合的导出和导入能力</p>

  <div class="content-card">
    <div class="content-cardtitle-text">预订设置</div>
    <div class="content-cardbody">

      <!-- 测试1: 提前预订（混合控件：隐藏select + inputNumber + timePicker） -->
      <div class="ant-row ant-form-item mb16">
        <div class="ant-col ant-col-4 ant-form-item-label">
          <label for="bookingControls.advanceBooking" class="ant-form-item-required" title="提前预订">提前预订</label>
        </div>
        <div class="ant-col ant-col-16 ant-form-item-control-wrapper">
          <div class="ant-form-item-control has-success">
            <span class="ant-form-item-children">
              <!-- 隐藏的时区选择器 -->
              <div class="nodisplay ant-select ant-select-enabled" style="margin-right: 10px;">
                <div class="ant-select-selection ant-select-selection--single">
                  <div class="ant-select-selection__rendered">
                    <div class="ant-select-selection-selected-value" title="(UTC+08:00)北京时间">(UTC+08:00)北京时间</div>
                  </div>
                </div>
              </div>

              <!-- 可见的天数输入框 -->
              <div class="ant-input-number" style="display: inline-block; margin-bottom: 0px; width: 65px;">
                <div class="ant-input-number-input-wrap">
                  <input placeholder="请输入" class="ant-input-number-input" autocomplete="off" min="0" step="1" value="1">
                </div>
              </div>
              <span style="margin: 0px 8px 0px 4px;">天</span>

              <!-- 时间选择器 -->
              <span class="ant-time-picker" style="width: 85px;">
                <input class="ant-time-picker-input" type="text" placeholder="请选择" value="18:00">
              </span>
              <span style="margin-left: 4px;">前可订</span>

              <div class="publicTip">假设今天为6月1号，设置提前2天，18：00前可订，则表示客人在今天18:00前可以预订到6月3号出发的产品。</div>
            </span>
          </div>
        </div>
      </div>

      <!-- 测试2: 儿童年龄（selectGroup：两个select + 分隔符） -->
      <div class="ant-row ant-form-item mb16">
        <div class="ant-col ant-col-4 ant-form-item-label">
          <label for="bookingControls.childrenAge" class="ant-form-item-required" title="">
            儿童年龄
            <i aria-label="图标: info-circle" class="info-circle">ℹ️</i>
          </label>
        </div>
        <div class="ant-col ant-col-16 ant-form-item-control-wrapper">
          <div class="ant-form-item-control has-success">
            <span class="ant-form-item-children">
              <div>
                <!-- 最小年龄 -->
                <div class="ant-select ant-select-enabled" style="width: 80px;">
                  <div class="ant-select-selection ant-select-selection--single">
                    <div class="ant-select-selection__rendered">
                      <div class="ant-select-selection-selected-value" title="2">2</div>
                    </div>
                  </div>
                </div>
                <span style="padding: 0px 10px;">-</span>

                <!-- 最大年龄 -->
                <div class="ant-select ant-select-enabled" style="width: 80px;">
                  <div class="ant-select-selection ant-select-selection--single">
                    <div class="ant-select-selection__rendered">
                      <div class="ant-select-selection-selected-value" title="12">12</div>
                    </div>
                  </div>
                </div>
                <span style="padding: 0px 8px;">周岁（不含）</span>
              </div>
            </span>
          </div>
        </div>
      </div>

      <!-- 测试3: 行程天数（inputNumberGroup：两个inputNumber + 分隔符） -->
      <div class="ant-row ant-form-item mb16">
        <div class="ant-col ant-col-4 ant-form-item-label">
          <label for="itinerary.duration" class="ant-form-item-required" title="行程天数">行程天数</label>
        </div>
        <div class="ant-col ant-col-16 ant-form-item-control-wrapper">
          <div class="ant-form-item-control has-success">
            <span class="ant-form-item-children">
              <div class="ant-input-number" style="width: 65px;">
                <div class="ant-input-number-input-wrap">
                  <input class="ant-input-number-input" value="3">
                </div>
              </div>
              <span style="padding: 0px 8px;">天</span>
              <div class="ant-input-number" style="width: 65px;">
                <div class="ant-input-number-input-wrap">
                  <input class="ant-input-number-input" value="2">
                </div>
              </div>
              <span style="padding: 0px 8px;">晚</span>
            </span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    console.log('测试页面已加载，请在浏览器中安装插件后测试导出功能');
    console.log('预期导出结果：');
    console.log('1. 提前预订: mixedGroup 类型，parts 应只包含可见控件（inputNumber + timePicker）');
    console.log('2. 儿童年龄: selectGroup 类型，values=[2,12], separators=["-", "周岁（不含）"]');
    console.log('3. 行程天数: inputNumberGroup 类型，values=[3,2], separators=["天", "晚"]');
  </script>
</body>
</html>
